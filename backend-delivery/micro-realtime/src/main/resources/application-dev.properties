# ========== CONFIGURACIÓN DOCKER (Desarrollo en contenedores) ==========
spring.application.name=micro-realtime
server.port=8099

eureka.instance.instance-id=${spring.application.name}

# Eureka Config
eureka.client.service-url.defaultZone=http://eureka:8762/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=realtime
ribbon.ConnectTimeout=5000
ribbon.ReadTimeout=30000

# Database Config (Postgres) - Cambio a hostname de Docker
spring.datasource.url=jdbc:postgresql://postgres:5432/deliverydb
spring.datasource.username=postgres
spring.datasource.password=Haikyuu1212
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB Config - Cambio a hostname de Docker
spring.data.mongodb.uri=mongodb://mongo:27017/tracking

# Kafka Config - Cambio a hostname de Docker
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=realtime-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Jackson Config
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
